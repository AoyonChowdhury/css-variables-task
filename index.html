<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Project-2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>

    <style>
        /* Use this for Default Style */
        :root {

            --primary-color: #5757be;
            --text-color: white;
            --sec-color: #6399e0;

        }

        /* Change the style according to Your preference */
        :root {

            --primary-color: #000000;
            --text-color: rgb(197, 197, 197);
            --sec-color: #e76666;

        }


        * {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;

        }

        body {
            background-color: var(--sec-color);
        }

        nav {
            background-color: var(--primary-color);
            color: var(--text-color);
            padding: 12px 0px;
        }

        ul {
            list-style-type: none;

        }

        ul li {
            display: inline;
            padding: 20px;
        }

        a {
            text-decoration: none;
            color: var(--text-color);
        }
    </style>
</head>

<body>
    <!-- Create a multi color websiite which can change color using CSS Variables -->
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">About</a></li>
                <li><a href="/">Contact</a></li>
                <li><a href="/">Help</a></li>
            </ul>
        </nav>
    </header>
</body>

</html>
